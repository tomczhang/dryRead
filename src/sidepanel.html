<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DryRead — 脱水阅读</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <img src="../icons/icon48.png" alt="" class="brand-icon" />
      <div class="brand-text">
        <span class="brand-name">DryRead</span>
        <span class="brand-slogan">脱去水分，留下真正有用的东西</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button id="btn-rerun" class="icon-btn" title="重新脱水">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button id="btn-settings" class="icon-btn" title="设置">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- 页面切换提示 -->
  <div id="tab-changed-bar" class="tab-changed-bar hidden">
    <span>页面已切换</span>
    <button id="btn-analyze-new" class="mini-btn">脱水此页</button>
  </div>

  <!-- 主视图 -->
  <main id="view-main" class="view">
    <!-- 当前页面信息 -->
    <div id="page-card" class="page-card hidden">
      <div id="page-title" class="page-title"></div>
      <div id="page-url" class="page-url"></div>
    </div>

    <!-- 加载中 -->
    <div id="state-loading" class="state hidden">
      <div class="drop-loader">
        <div class="drop"></div>
        <div class="drop d2"></div>
        <div class="drop d3"></div>
      </div>
      <div id="loading-text" class="loading-text">正在拧干这篇文章…</div>
      <div class="skeleton-group">
        <div class="skeleton" style="width: 90%"></div>
        <div class="skeleton" style="width: 70%"></div>
        <div class="skeleton" style="width: 80%"></div>
      </div>
    </div>

    <!-- 错误 -->
    <div id="state-error" class="state hidden">
      <div class="error-icon">🫗</div>
      <div id="error-text" class="error-text"></div>
      <div class="error-actions">
        <button id="btn-retry" class="primary-btn">重试</button>
        <button id="btn-goto-settings" class="ghost-btn">检查设置</button>
      </div>
    </div>

    <!-- 首次引导 -->
    <div id="state-welcome" class="state hidden">
      <div class="welcome-emoji">🍋</div>
      <div class="welcome-title">先配置你的模型</div>
      <div class="welcome-desc">DryRead 使用 OpenAI 兼容接口。填好请求地址和 API Key，就能一键脱水任何网页。</div>
      <button id="btn-welcome-settings" class="primary-btn">去配置</button>
    </div>

    <!-- 结果 -->
    <div id="state-result" class="hidden">
      <!-- 干货浓度 + 结论 -->
      <section class="card verdict-card">
        <div class="score-wrap">
          <div class="score-ring" id="score-ring">
            <span id="score-num" class="score-num">0</span>
          </div>
          <div class="score-meta">
            <span class="score-label">干货浓度</span>
            <span id="verdict-badge" class="verdict-badge">—</span>
          </div>
        </div>
        <p id="summary" class="summary"></p>
      </section>

      <!-- 精华（五合一） -->
      <section class="card" id="sec-highlights">
        <h2 class="sec-title"><span class="sec-emoji">💧</span>精华（点击在原文中高亮定位）</h2>
        <div id="list-highlights" class="highlight-list"></div>
        <p id="highlights-empty" class="highlights-empty hidden">这篇没什么值得带走的干货。</p>
      </section>

      <div class="result-footer">
        <button id="btn-copy" class="ghost-btn">复制精华</button>
      </div>
    </div>
  </main>

  <!-- 设置视图 -->
  <main id="view-settings" class="view hidden">
    <div class="settings-head">
      <button id="btn-back" class="icon-btn" title="返回">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      </button>
      <h1 class="settings-title">设置</h1>
    </div>

    <div class="card settings-card">
      <label class="field">
        <span class="field-label">请求地址（OpenAI 兼容）</span>
        <input id="input-base-url" type="text" placeholder="https://api.openai.com/v1" autocomplete="off" spellcheck="false" />
        <span class="field-hint">填到 /v1 这一级即可，DryRead 会自动补 /chat/completions</span>
      </label>
      <label class="field">
        <span class="field-label">API Key</span>
        <div class="key-row">
          <input id="input-api-key" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false" />
          <button id="btn-toggle-key" class="icon-btn" title="显示/隐藏">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-hint">仅保存在本机浏览器（chrome.storage.local），不会上传</span>
      </label>
      <label class="field">
        <span class="field-label">模型名称</span>
        <input id="input-model" type="text" placeholder="gpt-4o-mini" autocomplete="off" spellcheck="false" />
      </label>

      <div class="settings-actions">
        <button id="btn-save" class="primary-btn">保存</button>
        <button id="btn-test" class="ghost-btn">测试连接</button>
      </div>
      <div id="settings-status" class="settings-status"></div>
    </div>

    <div class="settings-about">
      DryRead v1.0.0 · 脱去水分，留下真正有用的东西
    </div>
  </main>

  <script src="llm.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
